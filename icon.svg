<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#FF3B30" opacity="0.95"/>

  <!-- Music note -->
  <g fill="white">
    <!-- Note stem -->
    <rect x="85" y="50" width="8" height="70" rx="4"/>

    <!-- Note head -->
    <ellipse cx="89" cy="120" rx="18" ry="14" transform="rotate(-20 89 120)"/>

    <!-- Eighth note flag -->
    <path d="M 93 50 Q 120 45 125 65 Q 120 60 110 62 Q 100 64 93 70 Z"/>
  </g>

  <!-- Lyric lines -->
  <g stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.9">
    <line x1="40" y1="145" x2="75" y2="145"/>
    <line x1="40" y1="160" x2="85" y2="160"/>
    <line x1="40" y1="175" x2="70" y2="175"/>
  </g>

  <!-- Accent dot -->
  <circle cx="155" cy="70" r="6" fill="white" opacity="0.8"/>
</svg>
